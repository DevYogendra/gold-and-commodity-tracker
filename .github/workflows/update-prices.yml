name: Update Historical Prices

on:
  schedule:
    # Runs at 06:00 UTC daily (after London open, metals priced)
    - cron: '0 6 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check Node.js version
        run: node --version  # ubuntu-latest ships with Node 20+

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run price updater
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: node scripts/update-prices.mjs

      - name: Commit & push if changed
        run: |
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update current-year price averages [$(date -u +%Y-%m-%d)]"
          git push
